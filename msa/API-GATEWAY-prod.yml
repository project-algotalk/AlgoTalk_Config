server:
  port: 8080

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

spring:
  application:
    name: API-GATEWAY

  # OAuth2 리소스 서버 설정 (JWT decode 키)
  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${JWT_SECRET_KEY}

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin Access-Control-Expose-Headers, RETAIN_FIRST
      # Gateway 라우팅 설정
      server:
        webflux:
          routes:
            - id: userService
              uri: lb://USER-SERVICE        # Eureka에 등록된 이름 (대문자)
              predicates:
                - Path=/api/user/**, /api/mypage/**, /api/cs-categories/**
              filters:
                - StripPrefix=1            # /api/user/login -> /user/login 으로 전달(맨 앞 글자 제거)

            - id: userService-oauth2
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/oauth2/**, /api/login/oauth2/**
              filters:
                - StripPrefix=1

            - id: interviewService
              uri: lb://INTERVIEW-SERVICE
              predicates:
                - Path=/api/interview/**
              filters:
                - StripPrefix=1

            - id: communityService
              uri: lb://COMMUNITY-SERVICE
              predicates:
                - Path=/api/community/**
              filters:
                - StripPrefix=1

            - id: aiService
              uri: http://localhost:8085
              predicates:
                - Path=/api/ai/**
              filters:
                - StripPrefix=1

      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:5173" # 명시적 출처로 변경(withCredentials 호환)
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - Set-Cookie
              - Authorization
            allowCredentials: true
            maxAge: 3600

jwt:
  token:
    access:
      name: AccessToken
    refresh:
      name: RefreshToken

api:
  server:
    user:
      protocol: http
      host: localhost
      port: 8081
      refresh-endpoint: /user/v1/token/reissue

management:
  endpoints:
    web:
      exposure:
        include: health, info, shutdown
  endpoint:
    shutdown:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.server: DEBUG