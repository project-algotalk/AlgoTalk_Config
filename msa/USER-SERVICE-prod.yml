server:
  port: 8081
  shutdown: graceful            # Graceful Shutdown

spring:
  application:
    name: userService

  cloud:
    config:
      enabled: false

  # MariaDB
  datasource:
    url: ${MARIA_DB_URL}
    username: ${MARIA_DB_USERNAME}
    password: ${MARIA_DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

  # MongoDB
  mongodb:
    uri: ${MONGO_DB_URI}

  # Redis

  data:
    redis:
      #      host: 192.168.5.128
      host: ${AWS_HOST}
      port: 6379
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}              # Redis 비밀번호 설정한 경우 주석 해제

      # (Optional) Redis connection pool 설정
      client:
        lettuce:
          pool:
            max-active: 32
            max-idle: 16
            min-idle: 4
            max-wait: 5s

  # Spring Redis Cache 설정
    cache:
        type: redis
        cache-names: "csCatetories" # 캐시 이름 설정
        redis:
            time-to-live: 10m # 캐시 TTL (10분, ms)
            use-key-prefix: true
            key-prefix: "cs:" # 캐시 키 접두사
            cache-null-values: false

  # OAuth2 소셜 로그인
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "http://localhost:8080/api/login/oauth2/code/{registrationId}"
            scope: email, profile
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "http://localhost:8080/api/login/oauth2/code/{registrationId}"
            scope: name, email, nickname
          kakao:
            client-id: ${KAKAO_CLIENT_ID} # rest api 키
            client-secret: ${KAKAO_CLIENT_SECRET} # client secret 키
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            redirect-uri: "http://localhost:8080/api/login/oauth2/code/{registrationId}"
            scope: profile_nickname
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth?prompt=select_account
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize?auth_type=reprompt
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize?prompt=login
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          from: ${MAIL_USERNAME}
          starttls:
            enable: true

# MyBatis
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true    # user_id → userId 자동 매핑
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  type-aliases-package: com.algotalk.userservice.dto

# JWT
jwt:
  secret:
    key: ${JWT_SECRET_KEY}
  access:
    token:
      expiration: 600000        # 10분 (ms)
  refresh:
    token:
      expiration: 604800000     # 7일 (ms)

# Cookie
cookie:
  access:
    name: AccessToken
  refresh:
    name: RefreshToken
  secure: false                 # 로컬 개발 시 false / 운영(HTTPS)에서는 true
  same-site: Lax


# 로그인 잠금
login:
  max-fail-count: 5 # 실패 허용 횟수
  lock-minutes: 1  # 잠금 시간 1분 (테스트용)

# Actuator (Graceful Shutdown 엔드포인트)
management:
  endpoint:
    shutdown:
      enabled: true
  health:
    mail:
      enabled: false # 메일 서버 상태 체크 비활성화
  endpoints:
    web:
      exposure:
        include: health, info, shutdown

# Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui/index.html

# Logging
logging:
  level:
    com.algotalk: DEBUG
    org.springframework.security: DEBUG
    org.mybatis: DEBUG

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    enabled: true # false: 로컬 개발 시 Eureka 비활성화 (필요 시 true로 변경)
  instance:
    prefer-ip-address: true

# Email 인증 TTL 설정 (분 단위)
userservice:
  email:
    auth-code-ttl-minutes: 3    # 인증번호 TTL
    verified-ttl-minutes: 30    # 인증 완료 플래그 TTL

# 프론트엔드 URL 설정
app:
  frontend:
    url: http://localhost:5173